<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bolt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e6b325"/>
      <stop offset="1" stop-color="#b8860b"/>
    </linearGradient>
  </defs>
  <!-- scattered blocks (stock layout) defragmenting into the bolt -->
  <g fill="#8c8c8c">
    <rect x="36"  y="96"  width="30" height="30" rx="5" opacity=".25"/>
    <rect x="92"  y="60"  width="30" height="30" rx="5" opacity=".35"/>
    <rect x="70"  y="170" width="30" height="30" rx="5" opacity=".35"/>
    <rect x="140" y="120" width="30" height="30" rx="5" opacity=".5"/>
    <rect x="118" y="230" width="30" height="30" rx="5" opacity=".5"/>
    <rect x="180" y="190" width="30" height="30" rx="5" opacity=".7" fill="#2c7fb8"/>
    <rect x="156" y="300" width="30" height="30" rx="5" opacity=".7" fill="#2c7fb8"/>
    <rect x="210" y="260" width="30" height="30" rx="5" opacity=".9" fill="#2c7fb8"/>
  </g>
  <!-- the bolt (packed, contiguous) -->
  <polygon points="342,20 158,306 262,306 204,492 414,202 302,202 366,20"
           fill="url(#bolt)" stroke="none"/>
</svg>
